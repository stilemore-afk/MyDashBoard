<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Information Dashboard</title>
  <style>
    :root {
      --bg-color: #121214;
      --card-bg: #1e1e24;
      --text-color: #e2e8f0;
      --text-muted: #94a3b8;
      --border-color: #2d3748;
      --primary-color: #3b82f6;
      --alert-color: #ef4444;
      --accent-color: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 20px;
      line-height: 1.4;
    }
    header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color);
    }
    .time-display { font-size: 1.2rem; font-weight: bold; color: var(--primary-color); }
    
    /* ログインフォームの簡易スタイリング */
    .login-box {
      max-width: 320px;
      margin: 60px auto;
      background: var(--card-bg);
      padding: 25px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
    }
    .login-box h2 { font-size: 1.2rem; margin-bottom: 15px; text-align: center; color: var(--primary-color); }
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
    .input-group input { width: 100%; padding: 8px 12px; background: #0f172a; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color); }
    .login-btn { width: 100%; padding: 10px; background: var(--primary-color); border: none; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; margin-top: 5px; }
    
    #main-container { display: none; }
    .dashboard-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px; align-items: start;
    }
    .left-column-group { display: flex; flex-direction: column; gap: 20px; }
    .card {
      background: var(--card-bg); border-radius: 16px; padding: 20px;
      border: 1px solid var(--border-color); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 15px; color: var(--primary-color); border-left: 4px solid var(--primary-color); padding-left: 10px; }
    .loading { text-align: center; color: var(--text-muted); padding: 20px; font-style: italic; }

    /* 天気 2列表示 */
    .weather-summary { display: flex; justify-content: space-around; background: #0f172a; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; }
    .weather-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .weather-item {
      display: grid; grid-template-columns: 2.8rem 1.5rem 2.5rem 1fr;
      align-items: center; font-size: 0.8rem; padding: 4px 0; border-bottom: 1px solid #334155;
    }
    .pop { color: #60a5fa; text-align: right; font-size: 0.7rem; }

    /* 鉄道情報 */
    .delay-item { background: #450a0a; border-left: 4px solid var(--alert-color); padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.85rem; }
    .delay-line { font-weight: bold; color: #fecaca; }
    .no-delay { color: var(--accent-color); text-align: center; font-weight: bold; padding: 10px; background: #064e3b; border-radius: 8px; }

    /* カレンダー日別・人別表示 */
    .day-block { margin-bottom: 20px; border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden; }
    .day-header { background: #334155; padding: 5px 12px; font-weight: bold; font-size: 0.9rem; }
    .person-block { padding: 8px 12px; border-top: 1px solid var(--border-color); }
    .person-name { font-size: 0.75rem; color: var(--primary-color); font-weight: bold; margin-bottom: 4px; display: block; text-decoration: underline; }
    .event-item { display: flex; gap: 10px; font-size: 0.85rem; margin-bottom: 3px; }
    .event-time { color: var(--accent-color); font-weight: bold; min-width: 85px; }
    
    .day-sat { color: #60a5fa !important; }
    .day-sun, .day-hol { color: #f87171 !important; }

    /* Gmail要約のデザイン */
    .gmail-group { margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden; }
    .gmail-header { background: #334155; padding: 5px 12px; font-weight: bold; font-size: 0.85rem; color: var(--text-color); }
    .mail-entry { padding: 8px 12px; border-top: 1px solid var(--border-color); font-size: 0.85rem; }
    .mail-entry:first-child { border-top: none; }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker 登録成功:', reg.scope))
          .catch(err => console.error('Service Worker 登録失敗:', err));
      });
    }
  </script>
</head>
<body>

<div id="login-container" class="login-box">
  <h2>Dashboard Login</h2>
  <form onsubmit="loginAndFetch(); return false;">
    <div class="input-group">
      <label for="username">ユーザー名:</label>
      <input type="text" id="username" name="username" autocomplete="username" placeholder="stilemore@gmail.com" required>
    </div>
    <div class="input-group">
      <label for="password">パスワード:</label>
      <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="login-btn">ログイン</button>
  </form>
</div>

<div id="loading" class="loading" style="font-size: 1.2rem; padding: 40px; display: none;">データを読み込み中...</div>

<div id="main-container">
  <header>
    <h1>Information Dashboard</h1>
    <div class="time-display" id="current-time">----/--/-- --:--:--</div>
  </header>

  <div class="dashboard-grid">
    <div class="left-column-group">
      <div class="card">
        <h2>天気予報 (24h)</h2>
        <div id="weather-summary" class="weather-summary">--°C / --°C</div>
        <div class="weather-columns">
          <div id="weather-left"></div>
          <div id="weather-right"></div>
        </div>
      </div>
      <div class="card">
        <h2>鉄道遅延</h2>
        <div id="train-list"><div class="loading">読込中...</div></div>
      </div>
    </div>

    <div class="card">
      <h2>カレンダー予定 (7日間)</h2>
      <div id="calendar-list"><div class="loading">読込中...</div></div>
    </div>

    <div class="card">
      <h2>メール要約</h2>
      <div id="gmail-list"><div class="loading">読込中...</div></div>
    </div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwNMJAHnVt8gz_Esdy5dkbl6jPPalHbf605kxMabyHN__PREXszxxJvczVhLSJf5KWx/exec";
  const LAT = "35.761", LON = "139.705";

  function updateClock() {
    const now = new Date();
    document.getElementById('current-time').textContent = now.toLocaleString('ja-JP');
  }
  setInterval(updateClock, 1000);
  updateClock();

  async function fetchWeather() {
    try {
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=temperature_2m,precipitation_probability,weathercode&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo`);
      const data = await res.json();
      document.getElementById('weather-summary').innerHTML = `<span style="color:#ef4444">${Math.round(data.daily.temperature_2m_max[0])}°C</span> / <span style="color:#38bdf8">${Math.round(data.daily.temperature_2m_min[0])}°C</span>`;

      const hourly = data.hourly;
      const nowIdx = hourly.time.findIndex(t => new Date(t) >= new Date());
      const icons = { 0:"☀️", 1:"🌤️", 2:"⛅", 3:"☁️", 45:"🌫️", 61:"🌧️", 80:"🌦️", 95:"⛈️" };

      document.getElementById('weather-left').innerHTML = '';
      document.getElementById('weather-right').innerHTML = '';

      for(let i=0; i<24; i++) {
        const idx = (nowIdx === -1 ? 0 : nowIdx) + i;
        if (!hourly.time[idx]) break;
        const time = new Date(hourly.time[idx]);
        const html = `<div class="weather-item">
          <div>${time.getHours()}:00</div>
          <div>${icons[hourly.weathercode[idx]] || "☁️"}</div>
          <div style="font-weight:bold">${Math.round(hourly.temperature_2m[idx])}°</div>
          <div class="pop">${hourly.precipitation_probability[idx]}%</div>
        </div>`;
        document.getElementById(i < 12 ? 'weather-left' : 'weather-right').innerHTML += html;
      }
    } catch(e) { console.error('Weather fetch error:', e); }
  }

  function updateDashboard(data) {
    // === ここから差し替え ===
    const gmailEl = document.getElementById('gmail-list');
    const gmailData = data.gmail || [];
    
    if (gmailData.length === 0) {
      gmailEl.innerHTML = '<div class="no-mail">未読の新着メールはありません</div>';
    } else if (gmailData[0].from === "エラー" || gmailData[0].from === "システム") {
      // エラー時の表示
      gmailEl.innerHTML = `<div style="color:var(--alert-color); padding:10px;">${gmailData[0].from}: ${gmailData[0].subject}<br><span style="font-size:0.8rem;">${gmailData[0].body || ''}</span></div>`;
    } else {
      // 正常にメールが取得できた場合の3行表示
      gmailEl.innerHTML = gmailData.map(m => `
        <div class="mail-item" style="margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color, #2d3748);">
          <div style="display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px;">
            <span class="mail-from" style="font-weight: bold; color: var(--primary-color);">${m.from}</span>
          </div>
          <div class="mail-subject" style="font-weight: 500; font-size: 0.95rem; margin-bottom: 6px;">${m.subject}</div>
          <div class="mail-body" style="font-size: 0.85rem; color: var(--text-muted); white-space: pre-wrap; line-height: 1.4; padding-left: 8px; border-left: 2px solid var(--border-color);">${m.body || ''}</div>
        </div>
      `).join('');
    }

    function getDateClass(dateStr, isHoliday) {
      const date = new Date(dateStr);
      if (isHoliday) return 'day-hol';
      const day = date.getDay();
      if (day === 0) return 'day-sun';
      if (day === 6) return 'day-sat';
      return '';
    }

    const calEl = document.getElementById('calendar-list');
    const calData = data.calendar || [];
    
    if (!calData.length) {
      calEl.innerHTML = `<div class="loading">今後7日間の予定はありません。</div>`;
    } else {
      const grouped = {};
      calData.forEach(ev => {
        if (!grouped[ev.date]) grouped[ev.date] = { display: ev.dateDisplay, isHoliday: ev.isHoliday, persons: {} };
        if (!grouped[ev.date].persons[ev.person]) grouped[ev.date].persons[ev.person] = [];
        grouped[ev.date].persons[ev.person].push(ev);
      });

      const fragment = document.createDocumentFragment();
      Object.keys(grouped).sort().forEach(date => {
        const cssClass = getDateClass(date, grouped[date].isHoliday);
        const dayBlock = document.createElement('div');
        dayBlock.className = 'day-block';
        
        let html = `<div class="day-header ${cssClass}">${grouped[date].display}</div>`;
        html += Object.keys(grouped[date].persons).map(person => `
          <div class="person-block">
            <span class="person-name">${person}</span>
            ${grouped[date].persons[person].map(ev => `
              <div class="event-item">
                <span class="event-time">${ev.time}</span>
                <span>${ev.title}</span>
              </div>
            `).join('')}
          </div>
        `).join('');
        
        dayBlock.innerHTML = html;
        fragment.appendChild(dayBlock);
      });
      calEl.innerHTML = '';
      calEl.appendChild(fragment);
    }

    const trainEl = document.getElementById('train-list');
    const trainData = data.train || [];
    trainEl.innerHTML = trainData.length ? trainData.map(t => `
      <div class="delay-item">
        <div class="delay-line">${t.title}</div>
        <div>${t.desc}</div>
      </div>
    `).join('') : '<div class="no-delay">遅延情報はありません</div>';
  }

  // ⚠️【修正】古い自動実行用の fetchData 関数は完全に削除しました

  // ログイン処理を実行するメイン関数
  async function loginAndFetch() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    
    const loginContainer = document.getElementById('login-container');
    const loadingEl = document.getElementById('loading');
    const containerEl = document.getElementById('main-container');
    
    if(!user || !pass) {
      alert("ユーザー名とパスワードを入力してください。");
      return;
    }
    
    // ログイン画面を隠し、ローディングを表示
    loginContainer.style.display = 'none';
    loadingEl.style.display = 'block';
    loadingEl.textContent = '認証中・データを読み込み中...';
    containerEl.style.display = 'none';
    
    fetchWeather(); // 天気は並列で取得
    
    try {
      const response = await fetch(`${GAS_URL}?user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}&_ts=${Date.now()}`);
      if (!response.ok) throw new Error('ネットワークの応答が正常ではありません。');
      
      const data = await response.json();
      
      if (data.error === "Unauthorized") {
        throw new Error('ユーザー名またはパスワードが正しくありません。');
      }
      
      updateDashboard(data);
      
      // 認証成功時：ローディングを隠し、メインダッシュボードを表示
      loadingEl.style.display = 'none';
      containerEl.style.display = 'block'; // grid適用の親要素を表示
      
    } catch (error) {
      console.error('Fetch error:', error);
      // エラー時はログインフォームを再表示し、エラーメッセージをポップアップ
      loginContainer.style.display = 'block';
      loadingEl.style.display = 'none';
      alert(error.message);
    }
  }
</script>
</body>
</html>
