<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Information Dashboard</title>
  <style>
    :root {
      --bg-color: #121214;
      --card-bg: #1e1e24;
      --text-color: #e2e8f0;
      --text-muted: #94a3b8;
      --border-color: #2d3748;
      --primary-color: #3b82f6;
      --alert-color: #ef4444;
      --accent-color: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* ==========================================================================
       1. 基準・基本スタイル（モバイルファースト：デフォルトはスマホ向けに小さく設定）
       ========================================================================== */
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 10px; /* スマホ向けに全体の余白を狭く */
      line-height: 1.3;
      font-size: 0.85rem; /* 全体の文字サイズをスマホ向けに一回り小さく */
      overflow-x: hidden;
    }
    header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border-color);
    }
    .time-display { font-size: 1rem; font-weight: bold; color: var(--primary-color); }
    
    /* ログインフォーム（スマホ対応） */
    .login-box {
      max-width: 100%;
      width: 290px;
      margin: 40px auto;
      background: var(--card-bg);
      padding: 18px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }
    .login-box h2 { font-size: 1.1rem; margin-bottom: 12px; text-align: center; color: var(--primary-color); }
    .input-group { margin-bottom: 12px; }
    .input-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
    .input-group input { width: 100%; padding: 6px 10px; background: #0f172a; border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-color); font-size: 0.85rem; }
    .login-btn { width: 100%; padding: 8px; background: var(--primary-color); border: none; border-radius: 6px; color: #fff; font-weight: bold; cursor: pointer; margin-top: 4px; font-size: 0.85rem; }
    
    #main-container { display: none; }

    /* スマホの基本レイアウト：1列に並べる */
    .dashboard-grid {
      display: flex;
      flex-direction: column;
      gap: 12px; 
      width: 100%;
    }
    .left-column-group { 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
      width: 100%;
    }
    
    /* カードデザイン（スマホ向けにコンパクト化） */
    .card {
      background: var(--card-bg); 
      border-radius: 12px; 
      padding: 12px; 
      border: 1px solid var(--border-color); 
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 100%;
    }
    .card h2 { font-size: 0.95rem; margin-bottom: 10px; color: var(--primary-color); border-left: 3px solid var(--primary-color); padding-left: 8px; }
    .loading { text-align: center; color: var(--text-muted); padding: 15px; font-style: italic; }

    /* 天気コンポーネント */
    .weather-summary { display: flex; justify-content: space-around; background: #0f172a; padding: 8px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; font-size: 0.8rem; }
    .weather-columns { display: flex; flex-direction: column; }
    .weather-item {
      display: grid; 
      grid-template-columns: 2.5rem 2rem 2.5rem 1fr; 
      align-items: center; 
      font-size: 0.8rem; 
      padding: 6px 0; 
      border-bottom: 1px solid #334155;
      width: 100%;
    }
    .pop { color: #60a5fa; text-align: right; font-size: 0.75rem; }

    /* 鉄道情報 */
    .delay-item { background: #450a0a; border-left: 3px solid var(--alert-color); padding: 8px; border-radius: 6px; margin-bottom: 8px; font-size: 0.75rem; }
    .delay-line { font-weight: bold; color: #fecaca; }
    .no-delay { color: var(--accent-color); text-align: center; font-weight: bold; padding: 8px; background: #064e3b; border-radius: 6px; font-size: 0.8rem; }

    /* カレンダー */
    .day-block { margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; width: 100%; }
    .day-header { background: #334155; padding: 4px 10px; font-weight: bold; font-size: 0.8rem; }
    .person-block { padding: 6px 10px; border-top: 1px solid var(--border-color); }
    .person-name { font-size: 0.7rem; color: var(--primary-color); font-weight: bold; margin-bottom: 2px; display: block; text-decoration: underline; }
    .event-item { display: flex; gap: 6px; font-size: 0.75rem; margin-bottom: 2px; }
    .event-time { color: var(--accent-color); font-weight: bold; min-width: 75px; flex-shrink: 0; }
    
    .day-sat { color: #60a5fa !important; }
    .day-sun, .day-hol { color: #f87171 !important; }

    /* Gmail要約 */
    .gmail-group { margin-bottom: 10px; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
    .gmail-header { background: #334155; padding: 4px 10px; font-weight: bold; font-size: 0.75rem; color: var(--text-color); }
    .mail-entry { padding: 6px 10px; border-top: 1px solid var(--border-color); font-size: 0.75rem; }
    .mail-entry:first-child { border-top: none; }

    /* ==========================================================================
       2. メディアクエリ：PC / Windows 向け（画面幅 992px 以上で3列に切り替え）
       ========================================================================== */
    @media (min-width: 992px) {
      body {
        padding: 20px;
        font-size: 0.9rem; /* PC環境に合わせた標準サイズ */
      }
      header { margin-bottom: 20px; padding-bottom: 10px; }
      .time-display { font-size: 1.2rem; }
      
      /* 全体を横並びの3列グリッドに指定 */
      .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr 1.2fr 1.2fr; 
        gap: 20px;
        align-items: start;
      }
      
      /* PC時は1列目のインナーコンテナとして縦並びを維持 */
      .left-column-group { 
        display: flex;
        flex-direction: column;
        gap: 20px;
        grid-column: 1;
      }
      
      .card {
        padding: 20px;
        border-radius: 16px;
      }
      .card h2 { font-size: 1.1rem; margin-bottom: 15px; border-left-width: 4px; padding-left: 10px; }
      
      .weather-item { font-size: 0.85rem; padding: 6px 0; }
      .weather-summary { font-size: 0.9rem; }
      .delay-item { font-size: 0.85rem; }
      .no-delay { font-size: 0.85rem; }
      .day-header { font-size: 0.9rem; }
      .event-item { font-size: 0.85rem; }
      .gmail-header { font-size: 0.85rem; }
      .mail-entry { font-size: 0.85rem; }
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker 登録成功:', reg.scope))
          .catch(err => console.error('Service Worker 登録失敗:', err));
      });
    }
  </script>
</head>
<body>

<div id="login-container" class="login-box">
  <h2>Dashboard Login</h2>
  <form onsubmit="loginAndFetch(); return false;">
    <div class="input-group">
      <label for="username">ユーザー名:</label>
      <input type="text" id="username" name="username" autocomplete="username" placeholder="stilemore@gmail.com" required>
    </div>
    <div class="input-group">
      <label for="password">パスワード:</label>
      <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="login-btn">ログイン</button>
  </form>
</div>

<div id="loading" class="loading" style="font-size: 1.2rem; padding: 40px; display: none;">データを読み込み中...</div>

<div id="main-container">
  <header>
    <h1>Information Dashboard</h1>
    <div class="time-display" id="current-time">----/--/-- --:--:--</div>
  </header>

  <div class="dashboard-grid">
    <div class="left-column-group">
      <div class="card">
        <h2>天気予報 (24h)</h2>
        <div id="weather-summary" class="weather-summary">--°C / --°C</div>
        <div class="weather-columns">
          <div id="weather-left" style="width: 100%;"></div>
        </div>
      </div>
      <div class="card">
        <h2>鉄道遅延</h2>
        <div id="train-list"><div class="loading">読込中...</div></div>
      </div>
    </div>

    <div class="card">
      <h2>カレンダー予定 (7日間)</h2>
      <div id="calendar-list"><div class="loading">読込中...</div></div>
    </div>

    <div class="card">
      <h2>メール要約</h2>
      <div id="gmail-list"><div class="loading">読込中...</div></div>
    </div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwNMJAHnVt8gz_Esdy5dkbl6jPPalHbf605kxMabyHN__PREXszxxJvczVhLSJf5KWx/exec";
  const LAT = "35.761", LON = "139.705";

  function updateClock() {
    const now = new Date();
    document.getElementById('current-time').textContent = now.toLocaleString('ja-JP');
  }
  setInterval(updateClock, 1000);
  updateClock();

  async function fetchWeather() {
    try {
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=temperature_2m,precipitation_probability,weathercode&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo`);
      const data = await res.json();
      document.getElementById('weather-summary').innerHTML = `<span style="color:#ef4444">${Math.round(data.daily.temperature_2m_max[0])}°C</span> / <span style="color:#38bdf8">${Math.round(data.daily.temperature_2m_min[0])}°C</span>`;

      const hourly = data.hourly;
      const nowIdx = hourly.time.findIndex(t => new Date(t) >= new Date());
      
      const icons = { 
        0: "☀️",  // 晴れ
        1: "🌤️",  // 主に晴れ
        2: "⛅",  // 晴れ時々曇り
        3: "☁️",  // 曇り
        45: "🌫️", // 霧
        48: "🌫️", // 氷霧
        61: "🌧️", // 小雨
        63: "🌧️", // 雨
        65: "☔",  // 大雨（強い雨）
        66: "🌨️", // 氷雨（弱）
        67: "🌨️", // 氷雨（強）
        71: "❄️",  // 雪（弱）
        73: "❄️",  // 雪（中）
        75: "❄️",  // 雪（強）
        77: "❄️",  // 霙（みぞれ）
        80: "🌦️", // にわか雨（弱）
        81: "🌧️", // にわか雨（中）
        82: "☔",  // 激しいにわか雨
        85: "❄️",  // にわか雪（弱）
        86: "❄️",  // にわか雪（強）
        95: "⛈️",  // 雷雨
        96: "⛈️",  // 雹（ひょう）を伴う雷雨
        99: "🌀"   // 激しい暴風雨・台風イメージ
      };

      document.getElementById('weather-left').innerHTML = '';

      const baseIdx = nowIdx === -1 ? 0 : nowIdx;
      for(let i=0; i<24; i++) {
        const idx = baseIdx + i;
        if (!hourly.time[idx]) break;
        const time = new Date(hourly.time[idx]);
        
        // コードに対応するアイコンがなければ、降水確率が50%以上の時は「☔」、それ以外は「☁️」にする
        const currentPop = hourly.precipitation_probability[idx];
        const defaultIcon = currentPop >= 50 ? "☔" : "☁️";
        const weatherIcon = icons[hourly.weathercode[idx]] || defaultIcon;

        const html = `<div class="weather-item">
          <div>${time.getHours()}:00</div>
          <div>${weatherIcon}</div>
          <div style="font-weight:bold">${Math.round(hourly.temperature_2m[idx])}°</div>
          <div class="pop">${currentPop}%</div>
        </div>`;
        document.getElementById('weather-left').innerHTML += html;
      }
    } catch(e) { console.error('Weather fetch error:', e); }
  }

  function updateDashboard(data) {
    const gmailEl = document.getElementById('gmail-list');
    const gmailData = data.gmail || [];

    if (gmailData.length === 0) {
      gmailEl.innerHTML = '<div class="no-mail">未読の新着メールはありません</div>';
    } else if (gmailData[0].from === "エラー" || gmailData[0].from === "システム") {
      gmailEl.innerHTML = `<div style="color:var(--alert-color); padding:10px;">${gmailData[0].from}: ${gmailData[0].subject}<br><span style="font-size:0.8rem;">${gmailData[0].body || ''}</span></div>`;
    } else {
      const groupedMail = {};
      gmailData.forEach(m => {
        if (!groupedMail[m.from]) groupedMail[m.from] = [];
        groupedMail[m.from].push(m);
      });

      gmailEl.innerHTML = Object.keys(groupedMail).map(sender => `
        <div class="day-block" style="margin-bottom: 20px; border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden;">
          <div class="day-header" style="background: #334155; padding: 5px 12px; font-weight: bold; font-size: 0.9rem; color: var(--text-color);">${sender}</div>
          <div class="mail-content-block" style="padding: 4px 0;">
            ${groupedMail[sender].map(m => `
              <div class="mail-entry-item" style="padding: 10px 12px; border-top: 1px solid var(--border-color); font-size: 0.85rem;">
                <div style="font-weight: bold; font-size: 0.9rem; margin-bottom: 6px; color: var(--text-color);">${m.subject}</div>
                <div style="color: var(--text-muted); white-space: pre-wrap; line-height: 1.45; padding-left: 8px; border-left: 2px solid var(--primary-color);">${m.body || ''}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    function getDateClass(dateStr, isHoliday) {
      const date = new Date(dateStr);
      if (isHoliday) return 'day-hol';
      const day = date.getDay();
      if (day === 0) return 'day-sun';
      if (day === 6) return 'day-sat';
      return '';
    }

    const calEl = document.getElementById('calendar-list');
    const calData = data.calendar || [];
    
    if (!calData.length) {
      calEl.innerHTML = `<div class="loading">今後7日間の予定はありません。</div>`;
    } else {
      const grouped = {};
      calData.forEach(ev => {
        if (!grouped[ev.date]) grouped[ev.date] = { display: ev.dateDisplay, isHoliday: ev.isHoliday, persons: {} };
        if (!grouped[ev.date].persons[ev.person]) grouped[ev.date].persons[ev.person] = [];
        grouped[ev.date].persons[ev.person].push(ev);
      });

      const fragment = document.createDocumentFragment();
      Object.keys(grouped).sort().forEach(date => {
        const cssClass = getDateClass(date, grouped[date].isHoliday);
        const dayBlock = document.createElement('div');
        dayBlock.className = 'day-block';
        
        let html = `<div class="day-header ${cssClass}">${grouped[date].display}</div>`;
        html += Object.keys(grouped[date].persons).map(person => `
          <div class="person-block">
            <span class="person-name">${person}</span>
            ${grouped[date].persons[person].map(ev => `
              <div class="event-item">
                <span class="event-time">${ev.time}</span>
                <span>${ev.title}</span>
              </div>
            `).join('')}
          </div>
        `).join('');
        
        dayBlock.innerHTML = html;
        fragment.appendChild(dayBlock);
      });
      calEl.innerHTML = '';
      calEl.appendChild(fragment);
    }

    const trainEl = document.getElementById('train-list');
    const trainData = data.train || [];
    trainEl.innerHTML = trainData.length ? trainData.map(t => `
      <div class="delay-item">
        <div class="delay-line">${t.title}</div>
        <div>${t.desc}</div>
      </div>
    `).join('') : '<div class="no-delay">遅延情報はありません</div>';
  }

  async function loginAndFetch() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    
    const loginContainer = document.getElementById('login-container');
    const loadingEl = document.getElementById('loading');
    const containerEl = document.getElementById('main-container');
    
    if(!user || !pass) {
      alert("ユーザー名とパスワードを入力してください。");
      return;
    }
    
    loginContainer.style.display = 'none';
    loadingEl.style.display = 'block';
    loadingEl.textContent = '認証中・データを読み込み中...';
    containerEl.style.display = 'none';
    
    fetchWeather(); 
    
    try {
      const response = await fetch(`${GAS_URL}?user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}&_ts=${Date.now()}`);
      if (!response.ok) throw new Error('ネットワークの応答が正常ではありません。');
      
      const data = await response.json();
      
      if (data.error === "Unauthorized") {
        throw new Error('ユーザー名またはパスワードが正しくありません。');
      }
      
      updateDashboard(data);
      loadingEl.style.display = 'none';
      containerEl.style.display = 'block'; 
      
    } catch (error) {
      console.error('Fetch error:', error);
      loginContainer.style.display = 'block';
      loadingEl.style.display = 'none';
      alert(error.message);
    }
  }
</script>
</body>
</html>
